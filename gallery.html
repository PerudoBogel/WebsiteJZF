<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Galeria</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .desc { background: #f9f9f9; padding: 15px; margin: 20px 0; border-left: 4px solid #333; white-space: pre-wrap; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <a href="indexPoC.html">← Powrót</a>
    <h1 id="title"></h1>
    <div id="description" class="desc"></div>
    <div id="gallery" class="grid"></div>

    <script src="js/detail_data.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');
        const gal = params.get('gal');
        const key = `${cat}/${gal}`;
        const data = galleryDetails[key];

        if (data) {
            document.getElementById('title').innerText = `${cat} > ${gal}`;
            document.getElementById('description').innerText = data.description || "Brak opisu.";
            
            const container = document.getElementById('gallery');
            data.images.forEach(imgName => {
                const img = document.createElement('img');
                img.src = `images/${cat}/${gal}/${imgName}`;
                container.appendChild(img);
            });
        }
    </script>
</body>
</html>
